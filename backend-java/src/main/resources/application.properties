# Server configuration
server.port=8081

# Active Profile
spring.profiles.active=default

# Database configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:4000/licypilot_db?user=postgres&password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SQL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE  

# Spring AI - GitHub Models (via OpenAI API)
spring.ai.openai.base-url=https://models.github.ai/inference
spring.ai.openai.api-key=${GITHUB_TOKEN}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.max-tokens=2048
spring.ai.openai.chat.options.timeout=120s

# Upload configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.servlet.multipart.max-request-size=50MB

